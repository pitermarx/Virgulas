<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Virgulas</title>
  <meta name="description" content="Local-first browser outliner">
  <meta name="apple-mobile-web-app-title" content="Virgulas" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script type="importmap">
    {
      "imports": {
        "preact":          "https://esm.sh/preact@10.19.3",
        "preact/hooks":    "https://esm.sh/preact@10.19.3/hooks",
        "@preact/signals": "https://esm.sh/@preact/signals@2.8.2?external=preact",
        "htm/preact":      "https://esm.sh/htm@3.1.1/preact?external=preact"
      }
    }
  </script>

  <link rel="stylesheet" href="css/style.css">

  <link rel="icon" type="image/png" href="media/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="media/favicon.svg" />
  <link rel="shortcut icon" href="media/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="media/apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
</head>

<body>
  <div id="app"></div>
  <script type="module" src="js/demo.js"></script>
  <script type="module">
    import outline from './js/outline.js'
    import persistence from './js/persistence.js';

    window.outline = outline
    // persistence.reset() // clear local data
    persistence.unlock("1234") // unlock with a new passphrase

    // outline.reset()
    // outline.addChild('root', { id: 'node-1', text: 'Node 1' })

  <script>
    function closeModals(e) {
      const isTargetModal = e.target.classList.contains('modal-overlay') || e.target.classList.contains('modal-close')
      if (!isTargetModal) return
      document.querySelectorAll('.modal-overlay').forEach(modal => modal.style.display = 'none')
    }
    function openModal(id) {
      document.getElementById(id).style.display = ''
    }
  </script>
  <div id="keyboard-shortcuts" class="modal-overlay" style="display: none;" onclick="closeModals(event)">
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 class="modal-title">Keyboard Shortcuts</h2><button class="modal-close" aria-label="Close"
          onclick="closeModals(event)">×</button>
      </div>
      <ul class="shortcut-list">
        <li class="shortcut-row"><kbd>Enter</kbd><span class="shortcut-desc">Add sibling</span></li>
        <li class="shortcut-row"><kbd>Backspace</kbd><span class="shortcut-desc">Delete empty node</span></li>
        <li class="shortcut-row"><kbd>Tab</kbd><span class="shortcut-desc">Indent</span></li>
        <li class="shortcut-row"><kbd>Shift+Tab</kbd><span class="shortcut-desc">Outdent</span></li>
        <li class="shortcut-row"><kbd>↑ / ↓</kbd><span class="shortcut-desc">Navigate</span></li>
        <li class="shortcut-row"><kbd>Alt+↑/↓</kbd><span class="shortcut-desc">Move node</span></li>
        <li class="shortcut-row"><kbd>Alt+→</kbd><span class="shortcut-desc">Zoom in</span></li>
        <li class="shortcut-row"><kbd>Alt+←</kbd><span class="shortcut-desc">Zoom out</span></li>
        <li class="shortcut-row"><kbd>Esc</kbd><span class="shortcut-desc">Toggle Search</span></li>
        <li class="shortcut-row"><kbd>Ctrl+Space</kbd><span class="shortcut-desc">Collapse / expand</span></li>
        <li class="shortcut-row"><kbd>Shift+Enter</kbd><span class="shortcut-desc">Edit description</span></li>
      </ul>
    </div>
  </div>
</body>

</html>
