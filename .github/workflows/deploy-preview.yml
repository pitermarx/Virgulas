name: Deploy PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event.action != 'closed'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Get safe branch name
        id: branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          SAFE_BRANCH=$(echo "$HEAD_REF" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "name=$SAFE_BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v6

      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: _main

      - name: Build combined artifact
        env:
          SAFE_BRANCH: ${{ steps.branch.outputs.name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _site
          cp -r _main/source/. _site/

          # Include previews for all currently open PRs
          gh pr list --repo "$GITHUB_REPOSITORY" --state open --json headRefName \
            --jq '.[].headRefName' | \
          while IFS= read -r branch; do
            SAFE=$(echo "$branch" | sed 's/[^a-zA-Z0-9._-]/-/g')
            mkdir -p "_site/preview/$SAFE"
            if [ "$SAFE" = "$SAFE_BRANCH" ]; then
              cp -r source/. "_site/preview/$SAFE/"
            else
              git fetch --depth=1 origin "$branch" && \
              git archive FETCH_HEAD -- source | tar --strip-components=1 -C "_site/preview/$SAFE/" -x || \
              echo "Warning: Could not fetch or extract preview for branch $branch - preview will be skipped"
            fi
          done

      - name: Inject Supabase config
        env:
          SUPABASE_PROJECT: ${{ vars.SUPABASE_PROJECT }}
          SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ vars.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: |
          find _site -name "state.js" -exec sed -i "s|__SUPABASE_PROJECT__|$SUPABASE_PROJECT|g" {} \;
          find _site -name "state.js" -exec sed -i "s|__SUPABASE_PUBLISHABLE_DEFAULT_KEY__|$SUPABASE_PUBLISHABLE_DEFAULT_KEY|g" {} \;

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          SAFE_BRANCH: ${{ steps.branch.outputs.name }}
        with:
          script: |
            const branch = process.env.SAFE_BRANCH;
            const pageUrl = '${{ steps.deployment.outputs.page_url }}';
            const previewUrl = `${pageUrl}preview/${branch}/`;
            const marker = '<!-- deploy-preview -->';
            const body = `${marker}\n## 🔍 Preview Deployment\n\n| Version | URL |\n|---|---|\n| **Current (main)** | ${pageUrl} |\n| **This branch** | ${previewUrl} |\n\nOpen both in separate tabs to compare.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    name: Cleanup Preview
    if: github.event.action == 'closed'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Build site with remaining previews
        env:
          GH_TOKEN: ${{ github.token }}
          CLOSED_HEAD_REF: ${{ github.head_ref }}
        run: |
          mkdir -p _site
          cp -r source/. _site/

          # Include previews for all remaining open PRs (the closed PR is excluded
          # because GitHub updates its state before the workflow runs)
          CLOSED_SAFE=$(echo "$CLOSED_HEAD_REF" | sed 's/[^a-zA-Z0-9._-]/-/g')

          gh pr list --repo "$GITHUB_REPOSITORY" --state open --json headRefName \
            --jq '.[].headRefName' | \
          while IFS= read -r branch; do
            SAFE=$(echo "$branch" | sed 's/[^a-zA-Z0-9._-]/-/g')
            if [ "$SAFE" != "$CLOSED_SAFE" ]; then
              mkdir -p "_site/preview/$SAFE"
              git fetch --depth=1 origin "$branch" && \
              git archive FETCH_HEAD -- source | tar --strip-components=1 -C "_site/preview/$SAFE/" -x || \
              echo "Warning: Could not fetch or extract preview for branch $branch - preview will be skipped"
            fi
          done

      - name: Inject Supabase config
        env:
          SUPABASE_PROJECT: ${{ vars.SUPABASE_PROJECT }}
          SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ vars.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: |
          find _site -name "state.js" -exec sed -i "s|__SUPABASE_PROJECT__|$SUPABASE_PROJECT|g" {} \;
          find _site -name "state.js" -exec sed -i "s|__SUPABASE_PUBLISHABLE_DEFAULT_KEY__|$SUPABASE_PUBLISHABLE_DEFAULT_KEY|g" {} \;

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
