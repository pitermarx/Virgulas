name: Deploy PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.event.action != 'closed'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Get safe branch name
        id: branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          SAFE_BRANCH=$(echo "$HEAD_REF" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "name=$SAFE_BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v6

      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: _main

      - name: Build combined artifact
        env:
          SAFE_BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          mkdir -p _site
          cp -r _main/source/. _site/
          mkdir -p "_site/preview/$SAFE_BRANCH"
          cp -r source/. "_site/preview/$SAFE_BRANCH/"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          SAFE_BRANCH: ${{ steps.branch.outputs.name }}
        with:
          script: |
            const branch = process.env.SAFE_BRANCH;
            const pageUrl = '${{ steps.deployment.outputs.page_url }}';
            const previewUrl = `${pageUrl}preview/${branch}/`;
            const marker = '<!-- deploy-preview -->';
            const body = `${marker}\n## 🔍 Preview Deployment\n\n| Version | URL |\n|---|---|\n| **Current (main)** | ${pageUrl} |\n| **This branch** | ${previewUrl} |\n\nOpen both in separate tabs to compare.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    name: Cleanup Preview
    if: github.event.action == 'closed'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'source'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
