name: Daily Tests

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  checks: write

jobs:
  daily-e2e:
    name: Daily E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Inject Supabase config
        env:
          SUPABASE_PROJECT: ${{ vars.SUPABASE_PROJECT }}
          SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ vars.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: |
          sed -i "s|__SUPABASE_PROJECT__|$SUPABASE_PROJECT|g" source/js/state.js
          sed -i "s|__SUPABASE_PUBLISHABLE_DEFAULT_KEY__|$SUPABASE_PUBLISHABLE_DEFAULT_KEY|g" source/js/state.js

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: test/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: test

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps
        working-directory: test

      - name: Run E2E tests
        id: tests
        run: npm run test:ci
        working-directory: test
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daily-playwright-results
          path: |
            test/test-results/
            test/playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Summarize test results
        if: always()
        run: |
          if [ -f test/test-results/results.json ]; then
            echo "## Daily Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('test/test-results/results.json', 'utf8'));
              const stats = results.stats;
              const status = stats.unexpected === 0 ? '✅ All tests passed' : '❌ Some tests failed';
              console.log(status);
              console.log('');
              console.log('| Metric | Count |');
              console.log('|--------|-------|');
              console.log('| Total  | ' + stats.total + ' |');
              console.log('| Passed | ' + stats.expected + ' |');
              console.log('| Failed | ' + stats.unexpected + ' |');
              console.log('| Flaky  | ' + stats.flaky + ' |');
              console.log('| Skipped| ' + stats.skipped + ' |');
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results file found." >> $GITHUB_STEP_SUMMARY
          fi
