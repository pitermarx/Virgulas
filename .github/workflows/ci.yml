name: CI and Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm test
        env:
          CI: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

  publish-db:
    name: Publish Database Migrations
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT: ${{ vars.SUPABASE_PROJECT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required Supabase secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT" || (echo "Missing SUPABASE_PROJECT" && exit 1)

      - name: Derive project ref
        id: project
        run: |
          PROJECT_REF="$SUPABASE_PROJECT"
          test -n "$PROJECT_REF" || (echo "SUPABASE_PROJECT is empty" && exit 1)
          echo "project_ref=$PROJECT_REF" >> "$GITHUB_OUTPUT"

      - name: Link Supabase project
        run: npm exec supabase -- link --project-ref "${{ steps.project.outputs.project_ref }}"

      - name: Publish latest migrations
        run: npm exec supabase -- db push --linked --include-all

  deploy:
    name: Deploy to GitHub Pages
    needs: [test, publish-db]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build static site bundle
        env:
          GH_TOKEN: ${{ github.token }}
          SUPABASE_URL: https://${{ vars.SUPABASE_PROJECT }}.supabase.co
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: |
          mkdir -p _site
          cp -r source/. _site/

          # Build PR preview folders under /preview/<branch-name>
          gh pr list --repo "$GITHUB_REPOSITORY" --state open --json headRefName --jq '.[].headRefName' | while IFS= read -r branch; do
            SAFE=$(echo "$branch" | sed 's/[^a-zA-Z0-9_-]/-/g')
            mkdir -p "_site/preview/$SAFE"
            git fetch --depth=1 origin "$branch"
            git archive FETCH_HEAD -- source | tar --strip-components=1 -C "_site/preview/$SAFE" -x
          done

          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            find _site -name "index.html" -exec sed -i "s|%%SUPABASE_URL%%|$SUPABASE_URL|g" {} \;
            find _site -name "index.html" -exec sed -i "s|%%SUPABASE_ANON_KEY%%|$SUPABASE_ANON_KEY|g" {} \;
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare secrets not set; skipping cache purge."
            exit 0
          fi

          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache"
