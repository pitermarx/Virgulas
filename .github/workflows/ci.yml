name: CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  commit-policy:
    name: Conventional Commit Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="${{ github.sha }}"
            else
              RANGE="$BEFORE..${{ github.sha }}"
            fi
          else
            RANGE="${{ github.sha }}"
          fi
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"

      - name: Validate Conventional Commit headers
        run: node scripts/check-conventional-commits.mjs --range "${{ steps.range.outputs.range }}"

  test:
    name: E2E Tests
    needs: commit-policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start local Supabase
        run: npm run db:start

      - name: Run E2E tests
        run: npm test
        env:
          CI: true

      - name: Stop local Supabase
        if: always()
        run: npm run db:stop

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

  publish-db:
    name: Publish Database Migrations
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT: ${{ vars.SUPABASE_PROJECT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required Supabase secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT" || (echo "Missing SUPABASE_PROJECT" && exit 1)

      - name: Derive project ref
        id: project
        run: |
          PROJECT_REF="$SUPABASE_PROJECT"
          test -n "$PROJECT_REF" || (echo "SUPABASE_PROJECT is empty" && exit 1)
          echo "project_ref=$PROJECT_REF" >> "$GITHUB_OUTPUT"

      - name: Link Supabase project
        run: npm exec supabase -- link --project-ref "${{ steps.project.outputs.project_ref }}"

      - name: Publish latest migrations
        run: npm exec supabase -- db push --linked --include-all

  release:
    name: Publish Release
    needs: [test, publish-db]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_needed: ${{ steps.plan.outputs.release_needed }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      resolved_version: ${{ steps.plan.outputs.resolved_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Plan release from commit history
        id: plan
        run: node scripts/release-from-commits.mjs

      - name: Create GitHub Release
        if: steps.plan.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.plan.outputs.release_tag }}"
          NOTES_FILE="${{ steps.plan.outputs.notes_file }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping publish."
            exit 0
          fi

          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE"

      - name: Bump version in package.json and source/version.json
        if: steps.plan.outputs.release_needed == 'true'
        run: |
          VERSION="${{ steps.plan.outputs.resolved_version }}"
          npm version "$VERSION" --no-git-tag-version
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('source/version.json', 'utf8'));
            v.version = process.env.VERSION;
            fs.writeFileSync('source/version.json', JSON.stringify(v, null, 2) + '\n');
          " VERSION="$VERSION"

      - name: Commit version bump
        if: steps.plan.outputs.release_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json source/version.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.plan.outputs.resolved_version }} [skip ci]"
          git push

  deploy-preview:
    name: Deploy Preview Pages (PR)
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout base branch content
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build static site bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p _site
          cp -r source/. _site/

          APP_VERSION=$(node -p "require('./package.json').version")
          node scripts/stamp-app-version.mjs --index "_site/index.html" --json "_site/version.json" --version "$APP_VERSION"
          echo "Stamped app version: $APP_VERSION"

          mkdir -p _site/preview
          cp source/preview.html _site/preview/index.html

          mapfile -t PR_ROWS < <(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 200 --json number,headRefName --jq '.[] | [.number, .headRefName] | @tsv')

          PREVIEW_COUNT=0
          declare -A USED_SLUGS=()

          for row in "${PR_ROWS[@]}"; do
            IFS=$'\t' read -r NUMBER BRANCH <<< "$row"

            SAFE=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_-]+/-/g; s/^-+//; s/-+$//')
            if [ -z "$SAFE" ]; then
              SAFE="pr-$NUMBER"
            fi

            if [ -n "${USED_SLUGS[$SAFE]:-}" ]; then
              SAFE="${SAFE}-pr-$NUMBER"
            fi
            USED_SLUGS[$SAFE]=1

            TARGET="_site/preview/$SAFE"
            mkdir -p "$TARGET"

            if git fetch --depth=1 origin "refs/pull/$NUMBER/head"; then
              git archive FETCH_HEAD -- source | tar --strip-components=1 -C "$TARGET" -x
              PREVIEW_COUNT=$((PREVIEW_COUNT + 1))
            else
              echo "::warning::Unable to fetch refs/pull/$NUMBER/head for branch '$BRANCH'. Skipping this preview."
              rm -rf "$TARGET"
            fi
          done

          echo "Generated $PREVIEW_COUNT preview bundle(s)."

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  deploy:
    name: Deploy to GitHub Pages
    needs: [test, publish-db, release]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build static site bundle
        env:
          GH_TOKEN: ${{ github.token }}
          APP_VERSION: ${{ needs.release.outputs.resolved_version }}
        run: |
          set -euo pipefail

          mkdir -p _site
          cp -r source/. _site/

          if [ -z "$APP_VERSION" ]; then
            APP_VERSION=$(node -p "require('./package.json').version")
          fi
          node scripts/stamp-app-version.mjs --index "_site/index.html" --json "_site/version.json" --version "$APP_VERSION"
          echo "Stamped app version: $APP_VERSION"

          mkdir -p _site/preview
          cp source/preview.html _site/preview/index.html

          mapfile -t PR_ROWS < <(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 200 --json number,headRefName --jq '.[] | [.number, .headRefName] | @tsv')

          PREVIEW_COUNT=0
          declare -A USED_SLUGS=()

          for row in "${PR_ROWS[@]}"; do
            IFS=$'\t' read -r NUMBER BRANCH <<< "$row"

            SAFE=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_-]+/-/g; s/^-+//; s/-+$//')
            if [ -z "$SAFE" ]; then
              SAFE="pr-$NUMBER"
            fi

            if [ -n "${USED_SLUGS[$SAFE]:-}" ]; then
              SAFE="${SAFE}-pr-$NUMBER"
            fi
            USED_SLUGS[$SAFE]=1

            TARGET="_site/preview/$SAFE"
            mkdir -p "$TARGET"

            if git fetch --depth=1 origin "refs/pull/$NUMBER/head"; then
              git archive FETCH_HEAD -- source | tar --strip-components=1 -C "$TARGET" -x
              PREVIEW_COUNT=$((PREVIEW_COUNT + 1))
            else
              echo "::warning::Unable to fetch refs/pull/$NUMBER/head for branch '$BRANCH'. Skipping this preview."
              rm -rf "$TARGET"
            fi
          done

          echo "Generated $PREVIEW_COUNT preview bundle(s)."

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare secrets not set; skipping cache purge."
            exit 0
          fi

          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache"
