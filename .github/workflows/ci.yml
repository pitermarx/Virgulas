name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: test/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: test

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps
        working-directory: test

      - name: Run E2E tests
        id: tests
        run: npm run test:ci
        working-directory: test
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test/test-results/
            test/playwright-report/
          retention-days: 30

      - name: Summarize test results for AI agent
        if: always()
        run: |
          if [ -f test/test-results/results.json ]; then
            echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('test/test-results/results.json', 'utf8'));
              const stats = results.stats;
              const status = stats.unexpected === 0 ? '✅ All tests passed' : '❌ Some tests failed';
              console.log(status);
              console.log('');
              console.log('| Metric | Count |');
              console.log('|--------|-------|');
              console.log('| Total  | ' + stats.total + ' |');
              console.log('| Passed | ' + stats.expected + ' |');
              console.log('| Failed | ' + stats.unexpected + ' |');
              console.log('| Flaky  | ' + stats.flaky + ' |');
              console.log('| Skipped| ' + stats.skipped + ' |');
              console.log('');
              if (stats.unexpected > 0) {
                console.log('### Failed Tests');
                console.log('');
                results.suites.forEach(suite => {
                  suite.suites && suite.suites.forEach(s => {
                    s.specs && s.specs.forEach(spec => {
                      spec.tests && spec.tests.forEach(test => {
                        if (test.status === 'unexpected') {
                          console.log('- ❌ **' + s.title + ' › ' + spec.title + '**');
                          test.results && test.results.forEach(r => {
                            r.errors && r.errors.forEach(err => {
                              console.log('  \`\`\`');
                              console.log('  ' + err.message);
                              console.log('  \`\`\`');
                            });
                          });
                        }
                      });
                    });
                  });
                });
              }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results file found." >> $GITHUB_STEP_SUMMARY
          fi

  auto-merge:
    name: Auto Rebase and Merge PR
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Rebase, merge and delete branch
        run: gh pr merge --rebase --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
