name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:install

      - name: Run E2E tests
        run: npm run test:ci
        env:
          CI: true
          SUPABASE_PROJECT: ${{ vars.SUPABASE_PROJECT }}
          SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ vars.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 15
          if-no-files-found: warn

      - name: Summarize test results
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
              const stats = results.stats;
              const status = stats.unexpected === 0 ? '✅ All tests passed' : '❌ Some tests failed';
              console.log(status);
              console.log('');
              console.log('| Metric | Count |');
              console.log('|--------|-------|');
              console.log('| Total  | ' + stats.total + ' |');
              console.log('| Passed | ' + stats.expected + ' |');
              console.log('| Failed | ' + stats.unexpected + ' |');
              console.log('| Flaky  | ' + stats.flaky + ' |');
              console.log('| Skipped| ' + stats.skipped + ' |');
              console.log('');
              if (stats.unexpected > 0) {
                console.log('### Failed Tests');
                console.log('');
                results.suites.forEach(suite => {
                  suite.suites && suite.suites.forEach(s => {
                    s.specs && s.specs.forEach(spec => {
                      spec.tests && spec.tests.forEach(test => {
                        if (test.status === 'unexpected') {
                          console.log('- ❌ **' + s.title + ' › ' + spec.title + '**');
                          test.results && test.results.forEach(r => {
                            r.errors && r.errors.forEach(err => {
                              console.log('  \`\`\`');
                              console.log('  ' + err.message);
                              console.log('  \`\`\`');
                            });
                          });
                        }
                      });
                    });
                  });
                });
              }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results file found." >> $GITHUB_STEP_SUMMARY
          fi

  deploy-db:
    name: Deploy DB Migrations
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: supabase-production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: 1.6.0

      - run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT }}
      - run: supabase db push

  deploy:
    name: Deploy to GitHub Pages
    needs: deploy-db
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build site with all open PR previews
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _site
          cp -r source/. _site/

          gh pr list --repo "$GITHUB_REPOSITORY" --state open --json headRefName \
            --jq '.[].headRefName' | \
          while IFS= read -r branch; do
            SAFE=$(echo "$branch" | sed 's/[^a-zA-Z0-9._-]/-/g')
            mkdir -p "_site/preview/$SAFE"
            git fetch --depth=1 origin "$branch" && \
            git archive FETCH_HEAD -- source | tar --strip-components=1 -C "_site/preview/$SAFE/" -x || \
            echo "Warning: Could not fetch or extract preview for branch $branch - preview will be skipped"
          done

      - name: Inject Supabase config
        env:
          SUPABASE_PROJECT: ${{ vars.SUPABASE_PROJECT }}
          SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ vars.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: |
          find _site -name "state.js" -exec sed -i "s|__SUPABASE_PROJECT__|$SUPABASE_PROJECT|g" {} \;
          find _site -name "state.js" -exec sed -i "s|__SUPABASE_PUBLISHABLE_DEFAULT_KEY__|$SUPABASE_PUBLISHABLE_DEFAULT_KEY|g" {} \;

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl --fail-with-body \
            --request POST \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache"
