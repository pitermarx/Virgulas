name: Auto-approve Agent PR Workflows

# pull_request_target runs in the base-branch context (no approval gate) even
# when the PR comes from an outside actor, giving us the permissions needed to
# approve the pull_request workflow runs that are stuck waiting.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write

jobs:
  approve:
    name: Approve Waiting Workflow Runs
    # Only auto-approve PRs opened by the Copilot coding agent
    if: github.actor == 'Copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Approve waiting workflow runs for PR head SHA
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          # Workflow runs triggered by pull_request may enter an "action_required"
          # state shortly after the push — poll up to 2 minutes.
          APPROVED=0
          for i in $(seq 1 12); do
            RUNS=$(gh api \
              "repos/$REPO/actions/runs?event=pull_request&head_sha=$HEAD_SHA&status=action_required" \
              --jq '.workflow_runs[].id')

            if [ -n "$RUNS" ]; then
              for RUN_ID in $RUNS; do
                echo "Approving workflow run $RUN_ID"
                gh api --method POST "repos/$REPO/actions/runs/$RUN_ID/approve"
              done
              APPROVED=1
              echo "All waiting runs approved."
              break
            fi

            echo "No waiting runs found yet, retrying in 10s... ($i/12)"
            sleep 10
          done

          if [ "$APPROVED" -eq 0 ]; then
            echo "No waiting workflow runs found after 2 minutes. Nothing to approve."
          fi
