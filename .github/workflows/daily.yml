name: Daily E2E Tests (Production)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test-production:
    name: E2E Tests (virgulas.com)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests against production
        run: npm test
        env:
          CI: true
          BASE_URL: https://virgulas.com

      - name: Upload production test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results-production
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
