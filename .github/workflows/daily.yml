name: Daily E2E Tests (Production)

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: E2E Tests (virgulas.com)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:install

      - name: Run E2E tests against production
        run: npm run test:ci
        env:
          CI: true
          BASE_URL: https://virgulas.com

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-production
          path: |
            test-results/
            playwright-report/
          retention-days: 15
          if-no-files-found: warn

      - name: Summarize test results
        if: always()
        run: |
          if [ -f test-results/results.json ]; then
            echo "## Production Test Results (virgulas.com)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
              const stats = results.stats;
              const status = stats.unexpected === 0 ? '✅ All tests passed' : '❌ Some tests failed';
              console.log(status);
              console.log('');
              console.log('| Metric | Count |');
              console.log('|--------|-------|');
              console.log('| Total  | ' + stats.total + ' |');
              console.log('| Passed | ' + stats.expected + ' |');
              console.log('| Failed | ' + stats.unexpected + ' |');
              console.log('| Flaky  | ' + stats.flaky + ' |');
              console.log('| Skipped| ' + stats.skipped + ' |');
              console.log('');
              if (stats.unexpected > 0) {
                console.log('### Failed Tests');
                console.log('');
                results.suites.forEach(suite => {
                  suite.suites && suite.suites.forEach(s => {
                    s.specs && s.specs.forEach(spec => {
                      spec.tests && spec.tests.forEach(test => {
                        if (test.status === 'unexpected') {
                          console.log('- ❌ **' + s.title + ' › ' + spec.title + '**');
                          test.results && test.results.forEach(r => {
                            r.errors && r.errors.forEach(err => {
                              console.log('  \`\`\`');
                              console.log('  ' + err.message);
                              console.log('  \`\`\`');
                            });
                          });
                        }
                      });
                    });
                  });
                });
              }
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results file found." >> $GITHUB_STEP_SUMMARY
          fi
